<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서울 쓰레기통 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <div class="hero">
          <div class="eyebrow">Seoul Waste Bin Map</div>
          <h1>서울 공원·광장 쓰레기통 위치</h1>
          <p>
            서울시 가로쓰레기통 설치정보 2025년 11월 데이터를 바탕으로 지도에 표시합니다.
            현재 위치를 잡고 구를 선택하면 버스정류장 경로와 경로 위 쓰레기통도 확인할 수 있습니다.
          </p>
        </div>

        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">원본 행</span>
            <strong id="rawCount">0</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">장소 수</span>
            <strong id="placeCount">0</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">표시 완료</span>
            <strong id="resolvedCount">0</strong>
          </div>
        </div>

        <div class="controls">
          <label>
            구 선택
            <select id="districtFilter">
              <option value="all">전체</option>
            </select>
          </label>
          <label>
            수거 종류
            <select id="typeFilter">
              <option value="all">전체</option>
              <option value="일반쓰레기">일반쓰레기</option>
              <option value="재활용쓰레기">재활용쓰레기</option>
              <option value="담배꽁초 수거함">담배꽁초 수거함</option>
            </select>
          </label>

          <div class="status" id="statusText">지도를 불러오는 중...</div>
          <button type="button" id="locateBtn" class="locate-btn">현재 위치</button>

          <div class="route-box">
            <label>
              버스정류장 검색
              <input
                id="busStopInput"
                class="route-input"
                type="text"
                placeholder="예: 광화문, 종로2가, 버스정류장"
              />
            </label>
            <button type="button" id="routeSearchBtn" class="route-btn">경로 찾기</button>
            <div class="route-status" id="routeStatus">
              현재 위치를 잡고 구를 선택한 뒤 버스정류장을 검색해 보세요.
            </div>
            <div id="routeList" class="route-list"></div>
          </div>
        </div>

        <div class="legend">
          <span><i class="dot general"></i> 일반쓰레기</span>
          <span><i class="dot recycle"></i> 재활용쓰레기</span>
          <span><i class="dot cigarette"></i> 담배꽁초 수거함</span>
        </div>

        <div class="list-wrap">
          <h2>표시 목록</h2>
          <div id="locationList" class="location-list"></div>
        </div>
      </aside>

      <main class="map-wrap">
        <div id="map"></div>
      </main>
    </div>

    <script src="./config.js" defer></script>
    <script src="./data.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
